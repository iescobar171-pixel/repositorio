<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repositorio GST</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
  <div class="header-logo">GST</div>
  <div>
    <div class="header-title">Repositorio GST</div>
    <div class="header-sub">Gestión de Servicios y Terceros — Minera Los Pelambres</div>
  </div>
  <div class="header-count" id="count-total">Cargando...</div>
</header>

<!-- ── TOOLBAR ── -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.849a1 1 0 0 0 1.415-1.414l-3.868-3.833zm-5.242 1.156a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar por nombre o sección..." autocomplete="off" />
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Todos</button>
    <button class="filter-btn" data-filter="pdf">📄 PDF</button>
    <button class="filter-btn" data-filter="word">📝 Word</button>
    <button class="filter-btn" data-filter="excel">📊 Excel</button>
    <button class="filter-btn" data-filter="pptx">📑 PowerPoint</button>
  </div>
</div>

<!-- ── STATS ── -->
<div class="stats-bar">
  <div class="stat-chip">
    <span class="stat-dot" style="background:#D32F2F"></span>
    PDF: <strong id="count-pdf">—</strong>
  </div>
  <div class="stat-chip">
    <span class="stat-dot" style="background:#1565C0"></span>
    Word: <strong id="count-word">—</strong>
  </div>
  <div class="stat-chip">
    <span class="stat-dot" style="background:#2E7D32"></span>
    Excel: <strong id="count-excel">—</strong>
  </div>
  <div class="stat-chip">
    <span class="stat-dot" style="background:#E65100"></span>
    PowerPoint: <strong id="count-pptx">—</strong>
  </div>
</div>

<!-- ── CONTENT ── -->
<main class="content">
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Cargando documentos...
    </div>
  </div>
</main>

<footer>
  GST MLP &mdash; Instructivos y Estándares &mdash; Minera Los Pelambres
</footer>

<script src="app.js"></script>
</body>
</html>
